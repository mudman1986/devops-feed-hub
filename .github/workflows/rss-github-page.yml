name: DevOps Feed Hub

on:
  push:

  schedule:
    - cron: "0 */12 * * *"

  workflow_dispatch:

permissions:
  actions: read
  contents: read
  id-token: write
  pages: write

concurrency:
  group: rss-github-pages-publish
  cancel-in-progress: false

jobs:
  build-pages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Collect RSS Feeds
        id: collect
        uses: mudman1986/rss-feed-collector-action@main
        with:
          hours: "8760"
          config-path: "config/rss-feeds.json"
          output-path: "rss-feeds-output.json"

      - name: Display collection stats
        if: always()
        env:
          TOTAL_ARTICLES: ${{ steps.collect.outputs.total-articles }}
          SUCCESSFUL_FEEDS: ${{ steps.collect.outputs.successful-feeds }}
          FAILED_FEEDS: ${{ steps.collect.outputs.failed-feeds }}
        run: |
          echo "## Collection Statistics"
          echo "- Total articles: $TOTAL_ARTICLES"
          echo "- Successful feeds: $SUCCESSFUL_FEEDS"
          echo "- Failed feeds: $FAILED_FEEDS"

      - name: Determine GitHub Pages publish target
        id: publish-target
        env:
          REPOSITORY_NAME: ${{ github.event.repository.name }}
          SOURCE_BRANCH: ${{ github.ref_name }}
        run: |
          DEPLOY_SUBDIR=""
          BASE_URL="https://${{ github.repository_owner }}.github.io/$REPOSITORY_NAME"
          SITE_LABEL="Production"

          if [ "$SOURCE_BRANCH" != "main" ]; then
            PREVIEW_SLUG=$(printf '%s' "$SOURCE_BRANCH" | tr '[:upper:]' '[:lower:]' | sed -e 's#/#--#g' -e 's/[^a-z0-9-]/-/g' -e 's/^-*//' -e 's/-*$//')
            if [ -z "$PREVIEW_SLUG" ]; then
              PREVIEW_SLUG="preview"
            fi
            DEPLOY_SUBDIR="preview/$PREVIEW_SLUG"
            BASE_URL="$BASE_URL/preview/$PREVIEW_SLUG"
            SITE_LABEL="Preview"
          fi

          {
            echo "deploy_subdir=$DEPLOY_SUBDIR"
            echo "base_url=$BASE_URL"
            echo "preview_slug=${PREVIEW_SLUG:-}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## GitHub Pages publish target"
            echo "- Source branch: \`$SOURCE_BRANCH\`"
            echo "- Deploy directory: \`site/${DEPLOY_SUBDIR}\`"
            echo "- $SITE_LABEL URL: ${BASE_URL}/"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Find latest Pages state artifact
        id: state-artifact
        uses: actions/github-script@v8
        with:
          script: |
            const artifactName = "github-pages-state";
            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: artifactName,
                per_page: 100,
              },
            );
            const artifact = artifacts
              .filter((candidate) => !candidate.expired)
              .sort(
                (left, right) =>
                  new Date(right.created_at) - new Date(left.created_at),
              )[0];
            core.setOutput(
              "download_url",
              artifact ? artifact.archive_download_url : "",
            );

      - name: Restore previous Pages state artifact
        id: restore-state
        if: steps.state-artifact.outputs.download_url != ''
        env:
          DOWNLOAD_URL: ${{ steps.state-artifact.outputs.download_url }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          rm -rf pages-state
          mkdir -p pages-state
          curl --fail --location \
            --header "Authorization: Bearer $GITHUB_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            "$DOWNLOAD_URL" \
            --output pages-state.zip
          unzip -q pages-state.zip -d pages-state
          rm -f pages-state.zip

          EXISTING_DIR="pages-state"
          if [ -d "pages-state/site" ]; then
            EXISTING_DIR="pages-state/site"
          fi

          echo "existing_dir=$EXISTING_DIR" >> "$GITHUB_OUTPUT"

      - name: Bootstrap Pages state from github-pages branch
        id: bootstrap-state
        if: steps.restore-state.outputs.existing_dir == ''
        run: |
          rm -rf pages-state
          mkdir -p pages-state
          git fetch origin github-pages:refs/remotes/origin/github-pages 2>/dev/null || true

          if git cat-file -e "origin/github-pages:site/index.html" 2>/dev/null; then
            git archive --format=tar origin/github-pages site | tar -xf - -C pages-state
            echo "existing_dir=pages-state/site" >> "$GITHUB_OUTPUT"
            echo "✓ Bootstrapped previous Pages state from github-pages branch"
          else
            echo "existing_dir=" >> "$GITHUB_OUTPUT"
            echo "No previous Pages state found to bootstrap"
          fi

      - name: Generate GitHub Pages content
        if: success()
        env:
          FEED_HUB_BASE_URL: ${{ steps.publish-target.outputs.base_url }}
        run: |
          rm -rf site-build
          mkdir -p site-build

          # Generate multi-page HTML (main index + individual feed pages)
          python3 scripts/workflows/rss-processing/generate_summary.py \
            --input rss-feeds-output.json \
            --output-dir site-build \
            --feeds-config config/rss-feeds.json

          echo "✓ GitHub Pages content generated (multi-page)"

          # Generate RSS feeds (master + individual feeds)
          python3 scripts/workflows/rss-processing/generate_rss.py \
            --input rss-feeds-output.json \
            --output-dir site-build

          echo "✓ RSS feeds generated"

      - name: Format HTML files
        if: success()
        run: |
          npx prettier --write site-build/*.html
          echo "✓ HTML files formatted with Prettier"

      - name: Merge Pages state with current build
        if: success()
        env:
          DEPLOY_SUBDIR: ${{ steps.publish-target.outputs.deploy_subdir }}
          EXISTING_DIR: ${{ steps.restore-state.outputs.existing_dir || steps.bootstrap-state.outputs.existing_dir }}
        run: |
          MERGE_ARGS=(
            --build-dir site-build
            --output-dir site
            --deploy-subdir "$DEPLOY_SUBDIR"
          )

          if [ -n "$EXISTING_DIR" ]; then
            MERGE_ARGS+=(--existing-dir "$EXISTING_DIR")
          fi

          python3 scripts/workflows/merge-pages-content.py "${MERGE_ARGS[@]}"

      - name: Update preview manifest
        if: success()
        env:
          SOURCE_BRANCH: ${{ github.ref_name }}
          PREVIEW_SLUG: ${{ steps.publish-target.outputs.preview_slug }}
          BASE_URL: ${{ steps.publish-target.outputs.base_url }}
        run: |
          MANIFEST='{"previews":[]}'
          ACTIVE_BRANCHES=$(git ls-remote --heads origin | awk '{sub("refs/heads/","",$2); print $2}')
          if [ -f site/preview/manifest.json ]; then
            MANIFEST=$(cat site/preview/manifest.json)
          fi

          export ACTIVE_BRANCHES
          export MANIFEST
          python3 scripts/workflows/update-preview-manifest.py
          echo "✓ Preview manifest ready"

      - name: Upload Pages state artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: github-pages-state
          path: site
          retention-days: 90

      - name: Upload GitHub Pages artifact
        if: success()
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy-pages:
    runs-on: ubuntu-latest
    needs: build-pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
