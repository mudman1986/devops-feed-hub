name: DevOps Feed Hub

on:
  push:

  schedule:
    - cron: "0 */12 * * *"

  workflow_dispatch:
    inputs:
      target-branch:
        description: "Target branch for GitHub Pages content (default: github-pages)"
        required: false
        default: "github-pages"

permissions:
  contents: write

jobs:
  collect-feeds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Collect RSS Feeds
        id: collect
        uses: mudman1986/rss-feed-collector-action@main
        with:
          hours: "8760"
          config-path: ".github/rss-feeds.json"
          output-path: "rss-feeds-output.json"

      - name: Display collection stats
        if: always()
        env:
          TOTAL_ARTICLES: ${{ steps.collect.outputs.total-articles }}
          SUCCESSFUL_FEEDS: ${{ steps.collect.outputs.successful-feeds }}
          FAILED_FEEDS: ${{ steps.collect.outputs.failed-feeds }}
        run: |
          echo "## Collection Statistics"
          echo "- Total articles: $TOTAL_ARTICLES"
          echo "- Successful feeds: $SUCCESSFUL_FEEDS"
          echo "- Failed feeds: $FAILED_FEEDS"

      - name: Determine GitHub Pages publish target
        id: publish-target
        env:
          REPOSITORY_NAME: ${{ github.event.repository.name }}
          SOURCE_BRANCH: ${{ github.ref_name }}
          TARGET_BRANCH_INPUT: ${{ github.event.inputs.target-branch }}
        run: |
          TARGET_BRANCH="github-pages"
          if [ -n "$TARGET_BRANCH_INPUT" ]; then
            TARGET_BRANCH="$TARGET_BRANCH_INPUT"
          fi

          DEPLOY_DIR="docs"
          BASE_URL="https://${{ github.repository_owner }}.github.io/$REPOSITORY_NAME"
          SITE_LABEL="Production"

          if [ "$SOURCE_BRANCH" != "main" ]; then
            PREVIEW_SLUG=$(printf '%s' "$SOURCE_BRANCH" | tr '[:upper:]' '[:lower:]' | sed -e 's#/#--#g' -e 's/[^a-z0-9._-]/-/g')
            DEPLOY_DIR="docs/preview/$PREVIEW_SLUG"
            BASE_URL="$BASE_URL/preview/$PREVIEW_SLUG"
            SITE_LABEL="Preview"
          fi

          {
            echo "target_branch=$TARGET_BRANCH"
            echo "deploy_dir=$DEPLOY_DIR"
            echo "base_url=$BASE_URL"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## GitHub Pages publish target"
            echo "- Source branch: \`$SOURCE_BRANCH\`"
            echo "- Target branch: \`$TARGET_BRANCH\`"
            echo "- Deploy directory: \`$DEPLOY_DIR\`"
            echo "- $SITE_LABEL URL: ${BASE_URL}/"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate GitHub Pages content
        if: success()
        env:
          FEED_HUB_BASE_URL: ${{ steps.publish-target.outputs.base_url }}
        run: |
          # Create docs directory if it doesn't exist
          mkdir -p docs

          # Generate multi-page HTML (main index + individual feed pages)
          python3 .github/workflows/scripts/rss-processing/generate_summary.py \
            --input rss-feeds-output.json \
            --output-dir docs \
            --feeds-config .github/rss-feeds.json

          echo "✓ GitHub Pages content generated (multi-page)"

          # Generate RSS feeds (master + individual feeds)
          python3 .github/workflows/scripts/rss-processing/generate_rss.py \
            --input rss-feeds-output.json \
            --output-dir docs

          echo "✓ RSS feeds generated"

      - name: Format HTML files
        if: success()
        run: |
          npx prettier --write docs/*.html
          echo "✓ HTML files formatted with Prettier"

      - name: Commit and push GitHub Pages content
        if: success()
        env:
          DEPLOY_DIR: ${{ steps.publish-target.outputs.deploy_dir }}
          TARGET_BRANCH: ${{ steps.publish-target.outputs.target_branch }}
        run: |
          bash .github/workflows/scripts/commit-github-pages.sh "docs" "$TARGET_BRANCH" "$DEPLOY_DIR"
